name: 比特幣每日價格追蹤 (BTC Quant Pipeline)

# 1. 觸發條件
on:
  schedule:
    # 0 0 * * * 代表 UTC 凌晨 0 點執行，也就是台灣時間的早上 8 點
    - cron: '0 0 * * *'
  workflow_dispatch: # 這個指令，可以隨時「手動點擊」執行測試

# 2. 執行什麼任務？
jobs:
  run-etl-pipeline:
    runs-on: ubuntu-latest # 跟 Github 借一台Linux 虛擬機

    steps:
    # 1：把我們倉庫裡的程式碼下載到這台虛擬電腦上
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2：在這台電腦上安裝 Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3：看著清單安裝需要的套件 (requests)
    - name: Install dependencies
      run: pip install -r requirements.txt

    # 4：執行我們的 ETL 腳本！
    - name: Run ETL script
      run: python btc_etl.py

    # 5：把更新後的 CSV 檔案存回 GitHub 倉庫
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add btc_etl.py crypto_history.db
        git commit -m "自動更新：新增 BTC 即時價格與 SQLite 資料庫" || echo "今天沒有新資料"
        git push
